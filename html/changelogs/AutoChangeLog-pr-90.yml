changes:
  - code_imp: "Теперь каждая из категорий ачивок имеет свой приз за выполнение (в основном 50 поинтов) за каждую ачивку, не считая базовую. Хард Рандом одарит вас +5 поинтами за каждый раунд, а если ещё в раунде съесть меинтс таблетки, то получишь +1 поинт за каждую."
  - code_imp: "Роли для покупки антага скорректированы. Теперь главы и специальные раундстарт роли (хуман ии и подобные) не могут купить антагов"